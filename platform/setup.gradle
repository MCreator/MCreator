            download.run {
                src "https://cache-redirector.jetbrains.com/intellij-jbr/${jbr25_linux_64}.tar.gz"
                dest 'build/tmp/jbr25_linux_64'
                overwrite true
            }
            copy { from tarTree(resources.gzip('build/tmp/jbr25_linux_64')) into jdkDir }
            delete 'build/tmp/jbr25_linux_64'

            copy { from file("${jdkDir.path}/${jbr25_linux_64}") into jdkDir }
            delete "${jdkDir.path}/${jbr25_linux_64}"

            // Space saving
            delete fileTree("${jdkDir.path}/jmods") { exclude 'java.base.jmod' }
        }

        ensureJdkLink('jbr25_linux_64', jbr25_linux_64)
    }
}

