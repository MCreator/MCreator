// export environment setup task
tasks.register('downloadNSIS') {
    group = 'setup'
    doLast {
        if (Os.isFamily(Os.FAMILY_WINDOWS)) {
            if (!file('build/tools/nsis/').exists()) {
                download.run {
                    src nsis_url
                    dest 'build/tmp/nsis'
                    overwrite true
                }
                copy { from zipTree(file('build/tmp/nsis')) into file('build/tools/') }
                file('build/tools/nsis-3.12').renameTo(file('build/tools/nsis'))
                delete 'build/tmp/nsis'

                download.run {
                    src nsis_lockedlist_plugin_url
                    dest 'build/tmp/nsis_lockedlist_plugin'
                    overwrite true
                }
                copy { from zipTree(file('build/tmp/nsis_lockedlist_plugin')) into file('build/tools/nsis/') }
                delete 'build/tmp/nsis_lockedlist_plugin'
            }
        }
    }
}

tasks.register('downloadMKISOFS') {
    group = 'setup'
    doLast {
        if (Os.isFamily(Os.FAMILY_WINDOWS)) {
            if (!file('build/tools/mkisofs/').exists()) {
                download.run {
                    src mkisofs_url
                    dest 'build/tmp/mkisofs'
                    overwrite true
                }
                copy {
                    from zipTree(file('build/tmp/mkisofs'))
                    into file('build/tools/')
                }
                file('build/tools/Binary').renameTo(file('build/tools/mkisofs'))
                delete 'build/tmp/mkisofs'
            }
        }
    }
}

tasks.register('initialSetup') {
    group = 'setup'

    if (Os.isFamily(Os.FAMILY_WINDOWS)) {
        dependsOn downloadJDKWin64
    } else if (Os.isFamily(Os.FAMILY_MAC)) {
        dependsOn downloadJDKMacAarch64, downloadJDKMacX64
    } else if (Os.isFamily(Os.FAMILY_UNIX)) {
        dependsOn downloadJDKLinux64
    }
}

if (idea.project != null) {
    idea.project.settings.taskTriggers {
        afterSync initialSetup
    }
}

static def resolvesToJdkLink(File link, File jdkDir) {
    if (!link.exists() || !jdkDir.exists()) return false

    try {
        return link.toPath().toRealPath().normalize() == jdkDir.toPath().toRealPath().normalize()
    } catch (IOException ignored) {
        return false
    }
}

static def isLinkToDifferentPath(File link) {
    if (!link.exists()) return false

    try {
        return link.toPath().toRealPath().normalize() != link.toPath().toAbsolutePath().normalize()
    } catch (IOException ignored) {
        return false
    }
}

def removeJdkLink(File link) {
    if (!link.exists()) return

    if (Files.isSymbolicLink(link.toPath()) || isLinkToDifferentPath(link)) {
        Files.delete(link.toPath())
    } else {
        delete link
    }
}

def ensureJdkLink(String linkName, String jdkName) {
    def jdkDir = file("jdk/${jdkName}")
    def link = file("jdk/${linkName}")

    if (resolvesToJdkLink(link, jdkDir)) {
        return
    }

    if (link.exists()) {
        println("Replacing link ${link} with a link to ${jdkDir}")
        removeJdkLink(link)
    }

    if (link.exists()) {
        throw new GradleException("Failed to replace ${link}. Close applications using it and retry.")
    }

    mkdir 'jdk'

    if (Os.isFamily(Os.FAMILY_WINDOWS)) {
        def process = new ProcessBuilder('cmd', '/c', 'mklink', '/J', link.absolutePath, jdkDir.absolutePath)
                .redirectErrorStream(true)
                .start()
        def output = process.inputStream.text.trim()
        if (process.waitFor() != 0) {
            throw new GradleException("Failed to create junction ${link}: ${output}")
        }
    } else {
        Files.createSymbolicLink(link.toPath(), jdkDir.toPath().getFileName())
    }
}
