import org.apache.tools.ant.taskdefs.condition.Os

import java.nio.file.Files

def jbr25_win_64 = 'jbrsdk_jcef-25.0.2-windows-x64-b329.117'
def jbr25_linux_64 = 'jbrsdk_jcef-25.0.2-linux-x64-b329.117'
def jbr25_mac_x64 = 'jbrsdk_jcef-25.0.2-osx-x64-b329.117'
def jbr25_mac_aarch64 = 'jbrsdk_jcef-25.0.2-osx-aarch64-b329.117'

// Binaries needed on Windows for export (install them using Gradle since Windows does not have a package manager)
def nsis_url = 'https://altushost-swe.dl.sourceforge.net/project/nsis/NSIS%203/3.12/nsis-3.12.zip'
def nsis_lockedlist_plugin_url = 'https://nsis.sourceforge.io/mediawiki/images/d/d3/LockedList.zip'
def mkisofs_url = 'https://master.dl.sourceforge.net/project/mkisofs-md5/mkisofs-md5-v2.01/mkisofs-md5-2.01-Binary.zip'

tasks.register('downloadJDKWin64') {
    group = 'setup'
    doLast {
        def link = file('jdk/jbr25_win_64')
        def jdkDir = file("jdk/${jbr25_win_64}")

        if (link.exists() && !resolvesToJdkLink(link, jdkDir)) {
            removeJdkLink(link)
        }

        if (!file("${jdkDir.path}/bin/java.exe").exists()) {
            mkdir jdkDir

            download.run {
                src "https://cache-redirector.jetbrains.com/intellij-jbr/${jbr25_win_64}.zip"
                dest 'build/tmp/jbr25_win_64'
                overwrite true
            }
            copy { from zipTree('build/tmp/jbr25_win_64') into jdkDir }
            delete 'build/tmp/jbr25_win_64'

            copy { from file("${jdkDir.path}/${jbr25_win_64}") into jdkDir }
            delete "${jdkDir.path}/${jbr25_win_64}"

            // Space saving
            delete fileTree("${jdkDir.path}/jmods") { exclude 'java.base.jmod' }
        }

        ensureJdkLink('jbr25_win_64', jbr25_win_64)
    }
}

tasks.register('downloadJDKLinux64') {
