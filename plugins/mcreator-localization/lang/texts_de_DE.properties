dialog.workspace.got_corrupted_message=<html><b>Der Arbeitsbereich, den du öffnen möchtest, wurde beschädigt.</b><br><br>Dies kann passieren, wenn MCreator unerwartet geschlossen wurde. Aber keine Sorge,<br>MCreator sichert automatisch die Arbeitsumgebung, sodass du deine Arbeitsumgebung auf eine der Sicherungskopien zurücksetzen können.<br><br>Wähle die Sicherungskopie aus, die wiederhergestellt werden soll und klicke auf OK.<br>
