action.workspace.export_mod=Exportiere den Mod zum Teilen...
dialog.workspace.export.message=<html><font size\=5>Mach dir eine Notiz von folgendem, wenn du deinen Mod verteilst\:</font><br><br>Dir ist <b>erlaubt</b>, deinen Mod frei unter deinen eigenen Bedingungen oder Lizenzen zu vertreiben.<br> Du <b>musst</b> bei anderen Gesetzen, Lizenzen und Bedingungen bleiben, die auf dich als Minecraft Mod-Autor zutreffen<br>(z.B. Minecraft-EULA, Minecraft Forge-Lizenz, ...).<br>Du kannst <b>gerne</b> auf MCreator verlinken und es auf deiner Mod-Seite weiterempfehlen.<br><br><b>Überlege, ob du ans MCreator-Team spenden möchtest</b>, um es möglich zu machen, dass diese Software weiterhin verwaltet und weiterentwickelt wird und du Unterstützung und Updates bekommst<br> Vielen Dank\!
