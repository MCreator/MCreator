dialog.workspace.resources.import_obj_mtl_model.message=<html>Der OBJ-Modellrenderer weist einige Einschränkungen auf, die Sie beachten müssen\:<br><br>- Es werden nur sehr einfache MTL Materialien unterstützt<br>- UV-Texturen können nur Scheitelpunkttexturen zwischen 0 und 1 haben<br>- UV-Texturen müssen im PNG-Format vorliegen<br>- Stellen Sie sicher, dass die Dateien .mtl und .obj nur ASCII-Buchstaben enthalten<br>- Stellen Sie sicher, dass die Dateien .mtl und .obj in Kleinbuchstaben geschrieben sind und keine Leerzeichen in ihren Namen enthalten<br>- Die OBJ-Datei muss auf die richtige Materialdatei verweisen<br><br><b>Verwenden Sie wenn möglich das JSON-Modell anstelle des OBJ-Modells, da es besser funktioniert.
