dialog.workspace.resources.import_java_model.version_notice.message=<html><b>Für Minecraft &gt;\= 1.15 erstellte Java-Modelle funktionieren NICHT mit Versionen unter 1.15 (z. B. 1.14.4)\!</b><br><br>Um die Modellversion in Blockbench festzulegen, gehe zu Datei - > Projekt -> Version exportieren.<br>Nachdem du eine neue Exportversion festgelegt hast, exportiere das Modell erneut in eine Java-Datei und importiere es in MCreator.
dialog.workspace.resources.import_java_model.version_notice_new.message=<html><b>Dieser Generator erfordert Java-Modelle, die für Minecraft <br><br>{0} entwickelt wurden.</b><br><br>Stelle sicher, dass der Java-Modellcode für diese Minecraft-Version erstellt wurde. <br>Du kannst dieses Modell möglicherweise mit anderen Generatoren wiederverwenden, abhängig von<br>, ob andere Generatoren die Kompatibilität mit dieser Minecraft-Version erklären.
dialog.workspace.resources.import_java_model.version_notice.title=Java-Modell importieren
dialog.workspace.version_switch.java_model_warning=<html><b>Es scheint, dass deine Arbeitsumgebung Java-Modelle verwendet.</b><br><br>Der Generator, auf den du gewechselt bist, benötigt eine andere Minecraft-Version. Für einen nahtlosen Übergang<br>musst du deine Modelle für die Minecraft-Version dieses Generators exportieren und sie erneut mit dem gleichen<br>Namen importieren. MCreator wird dann die richtige Modellversion beim Wechseln zwischen Generatoren verwenden.<br><br>Sie müssen die folgenden Java-Modelle erneut exportieren, deren Format von diesem Generator nicht unterstützt wird\:<br><br><b>{0}
dialog.workspace.version_switch.java_model_warning.title=Java-Modelle Warnung
dialog.workspace.resources.import_java_model.invalid_model_name.message=<html><b>Ihr Modellname </b><kbd>{0}</kbd><b> ist kein gültiger Java-Name\!</b><br><br>Benutzerdefinierte Mob-Modellnamen dürfen keine Leerzeichen enthalten, mit Zahlen beginnen und keine ASCII-Buchstaben enthalten.<br><br>Der Modellname <b>ist nicht der Dateiname </b>, sondern der Name im Modell-Java-Code (Modellklassenname)\!<br><small>Die beste Lösung für dieses Problem besteht darin, den Modellnamen in Ihrem Modellierer ordnungsgemäß zu definieren, bevor Sie das Modell exportieren.
dialog.workspace.resources.import_java_model.invalid_model_name.title=Ungültiger Modellname
dialog.workspace.resources.import_java_animation.invalid_animation_name.message=<html><b>Dein Animationsname </b><kbd>{0}</kbd><b> ist kein gültiger Java-Name\!</b><br><br>Benutzerdefinierte Animationsnamen dürfen keine Leerzeichen enthalten, mit Anzahl beginnen oder keine ASCII-Zeichen enthalten.<br><br>Animationsname <b>ist kein Dateiname</b>, sondern der Name innerhalb des Java-Animationscodes (Animationsklassenname)\!<br><small>Die beste Lösung für dieses Problem ist die korrekte Definition des Animationsnamens in deinem Modellierer, bevor du die Animation exportierst.
dialog.workspace.resources.import_java_animation.invalid_animation_name.title=Ungültiger Animationsname
dialog.workspace.resources.import_java_model.invalid_model_format.message=<html><b>Ihr Modell ist kein gültiges Java-Modell\!</b><br><br>Stellen Sie sicher, dass alle Modellteile einen gültigen Java-Namen haben<br>und dass Ihr Modell tatsächlich ein Java-Modell mit einer gültigen Syntax ist.
