dialog.tools.inject_tags.title=Füge der Arbeitsumgebung allgemeine Tags hinzu
dialog.tools.inject_tags.confirm=Tags hinzufügen
dialog.tools.inject_tags.text_top=<html>Wählen Sie die Tags aus, die zum Arbeitsbereich hinzugefügt werden sollen, und klicken Sie auf <i>Tags</i>.<br><small>Denken Sie daran, dass dies nur eine Teilmenge möglicher Tags ist. Es gibt viele andere Tags, die verwendet werden können.
dialog.tools.inject_tags.tag.blocks.minecraft.dirt=Bäume und Blätter können auf diesen Blöcken wachsen. Füge Blöcke hinzu, die du als (Unter-)Boden deiner Biome verwendest.
dialog.tools.inject_tags.tag.blocks.minecraft.sand=Alles, was auf Sand wachsen kann, generiert auf diesem Block. Schildkröten spawnen auch auf diesem Block.
dialog.tools.inject_tags.tag.blocks.minecraft.logs=Wenn sich ein Block in diesem Tag nahe eines Blatt-blocks befindet, werden die Blätter nicht verfallen.
dialog.tools.inject_tags.tag.blocks.minecraft.climbable=Dieser Tag wird verwendet, um zu bestimmen, welche Blöcke der Spieler klettern kann. Wird auch von Wesen KI-Pfadfindern verwendet.
dialog.tools.inject_tags.tag.blocks.minecraft.fences=Wird von Pfadfindern verwendet und um Verbindungen mit Zäunen und Leinen zu ermitteln.
dialog.tools.inject_tags.tag.blocks.minecraft.wooden_fences=Wird verwendet, um Verbindungen mit Holzzäunen zu bestimmen. Blöcke, die mit diesem Tag markiert sind, sind auch in "minecraft\:fences" enthalten.
dialog.tools.inject_tags.tag.blocks.minecraft.walls=Wird von der Pfadfinder-Ki verwendet und um Verbindungen mit anderen Wänden, Scheiben, Barren und Toren zu ermitteln.
dialog.tools.inject_tags.tag.blocks.minecraft.bee_growables=Bienen können diese Blöcke bestäuben, um eine Stufe zu wachsen
dialog.tools.inject_tags.tag.blocks.minecraft.impermeable=Blöcke in diesem Tag lassen keine Flüssigkeiten oder Honig durchtropfen.
dialog.tools.inject_tags.tag.blocks.minecraft.leaves=Wird verwendet, um die Zerstörungsgeschwindigkeit durch Scheren und Schwerter zu bestimmen, die von der KI einiger Mobs verwendet werden.
dialog.tools.inject_tags.tag.blocks.minecraft.valid_spawn=Wird verwendet, um festzustellen, ob ein Ort eine gültige Anfangsspawnposition für den Spieler ist.
dialog.tools.inject_tags.tag.blocks.minecraft.fire=Wird von Mob-KI-Pfadfinder je nach ihren Aktionen mit Feuer verwendet.
dialog.tools.inject_tags.tag.blocks.minecraft.beacon_base_blocks=Wird von Leuchtfedern benutzt um zu überprüfen, welche Basisblöcke es aktivieren können.
dialog.tools.inject_tags.tag.blocks.minecraft.dragon_immune=Wird benutzt um zu bestimmen, welche Blöcke der Enderdrache nicht zerstören kann.
dialog.tools.inject_tags.tag.blocks.minecraft.wither_immune=Wird benutzt um zu bestimmen, welche Blöcke der Wither nicht zerstören kann.
dialog.tools.inject_tags.tag.blocks.minecraft.animals_spawnable_on=Wird verwendet, um zu bestimmen, auf welchen Blöcken Tiere spawnen können.
dialog.tools.inject_tags.tag.blocks.minecraft.prevent_mob_spawning_inside=Mobs können nicht in Blöcken spawnen, die in dieser Tag-Gruppe markiert sind.
dialog.tools.inject_tags.tag.items.minecraft.arrows=Gegenstände in dieser Taggruppe können von Bögen und Armbrüsten geschossen und verwendet werden.
dialog.tools.inject_tags.tag.items.minecraft.planks=Items in dieser Tag-Gruppe werden mit allen Vanilla-Brett-Rezepten funktionieren.
dialog.tools.inject_tags.tag.items.minecraft.meat=Gegenstände in dieser Tag-Gruppe können als Fleisch verwendet werden.
dialog.tools.inject_tags.tag.items.minecraft.enchantable.weapon=Gegenstände unter diesem Tag können mit Verzauberungen vom Typ der Waffe verzaubert werden.
dialog.tools.inject_tags.tag.items.minecraft.enchantable.mining=Gegenstände unter diesem Tag können mit Verzauberungen vom Minentyp verzaubert werden.
dialog.tools.inject_tags.tag.items.minecraft.enchantable.equippable=Gegenstände unter diesem Tag können mit Verzauberungen vom Typ ausgerüstet werden.
dialog.tools.inject_tags.tag.items.minecraft.enchantable.bow=Gegenstände unter diesem Tag können mit Verzauberungen vom Typ Bögen verzaubert werden.
dialog.tools.inject_tags.tag.functions.minecraft.tick=In dieser Tag-Gruppe markierte Funktionen werden jeden Welt-Tick aufgerufen.
dialog.tools.inject_tags.tag.functions.minecraft.load=Funktionen, die in dieser Tag-Gruppe markiert sind, werden aufgerufen, wenn die Welt geladen wird.
dialog.tools.inject_tags.tag.entities.minecraft.arrows=Entitäten in dieser Tag-Gruppe können von Bögen und Armbrüsten aufgenommen und verwendet werden.
dialog.tools.inject_tags.tag.entities.minecraft.beehive_inhabitors=Entitäten in dieser Tag-Gruppe können sich in Bienenstöcken befinden.
dialog.tools.inject_tags.tag.entities.minecraft.impact_projectiles=Entitäten in dieser Tag-Gruppe können Ziel-Blöcke aktivieren.
dialog.tools.inject_tags.tag.entities.minecraft.skeletons=Entitäten in diesem Tag können Creeper töten und Musik-Discs ablegen.
dialog.tools.inject_tags.tag.entities.minecraft.powder_snow_walkable_mobs=Entitäten in diesem Tag können auf Schnee-Pulverblöcke gehen.
dialog.tools.inject_tags.tag.entities.minecraft.undead=Entitäten in diesem Tag sind untot.
dialog.tools.inject_tags.tag.entities.minecraft.illager=Entitäten in diesem Tag sind freundlich zu Plünderern.
