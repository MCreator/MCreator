workspace.elements.lock_modelement_message=<html><b>Du versuchst, den Code dieses Mod Elements zu sperren oder zu entsperren\!</b><br><br> Wenn der Code gesperrt ist, wird MCreator den Quellcode nicht mehr ändern, aber das heißt<br>, dass wenn MCreator aktualisiert wird, Fehlerkorrekturen und Minecraft-Versionsupgrades nicht mehr<br> auf die Elemente angewendet werden, die gesperrt sind.<br><br>Die Mod Elemente, die gerade gesperrt und ausgewählt sind, werden wieder entsperrt.<br>Das heißt, dass der komplette benutzerdefinierte Code für diese Mod Elemente von MCreator überschrieben wird.<br><br><small>Lese die Wiki-Seite über die Codesperrung auf MCreator's Website, bevor du diese Aktion verwendest.
