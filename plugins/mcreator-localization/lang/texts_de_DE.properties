modelement.unknown.description=Dieser Mod-Element-Typ existiert nicht mehr
modelement.attribute.description=Attribut ist ein anpassbarer Wert, der ein Merkmal eines Objekts oder eines Spielers ändern kann.
modelement.achievement.description=Eine Errungenschaft ist ein Text der Angezeigt wird, wenn der Spieler etwas bestimmtes macht, was benötigt wird um sie zu erhalten.
modelement.armor.description=Eine Rüstung ist ein Gegenstand, den man anziehen kann, der dir dann Schutz bietet.
modelement.armortrim.description=Eine Rüstungsverzierung ist eine kosmetische Änderung, die an einem Schmiedetisch auf Rüstung angewendet werden kann.
modelement.bannerpattern.description=Das Bannermuster ist ein dekoratives Muster, das auf ein Banner angewendet werden kann.
modelement.biome.description=Ein Biom ist ein spezifischer Bereich in der Welt mit Einstellungen für die Welt-Generation, Farbgebung, Wetter und Pflanzen-/Tierwelt.
modelement.block.description=Ein Block ist die Basiseinheit in Minecraft. Es ist ein 3D-Objekt, welches in der Welt platziert werden kann.
modelement.code.description=Ein Benutzerdefiniertes Element ist eigener Code im Code-Editor.
modelement.command.description=Befehle sind eine Anzahl von Argumenten, die eine Aktion ausführen wenn ein Benutzer sie in den Chat schreibt.
modelement.damagetype.description=Der Schadenstyp bestimmt, wie der Schaden auf Entitäten angewendet werden soll.
modelement.dimension.description=Eine Dimension ist eine generierte Welt mit eigenen Eigenschaften und kann zum Betreten ein Portal haben.
modelement.enchantment.description=Eine Verzauberung ist ein Modifikator, der einem Gegenstand spezielle Fähigkeiten verleiht.
modelement.gamerule.description=Die Spielregel ist ein anpassbarer Parameter für eine bestimmte Spielwelt
modelement.feature.description=Funktion ist eine Dekoration, die während der Weltgenerierung platziert wird.
modelement.fluid.description=Flüssigkeit ist ein spezieller Block, der als Flüssigkeit wirken kann. Er wird sich auf die ganze Welt ausbreiten.
modelement.food.description=Essen ist ein Gegenstand, der gegessen werden- und Effekte geben kann.
modelement.fuel.description=Treibstoff ist ein Block oder Gegenstand, der in Öfen als Energiequelle genutzt werden kann.
modelement.function.description=Eine Funktion erlaubt Spielern Befehle auszuführen, wenn sie aufgerufen wird.
modelement.gui.description=Ein GUI ist ein anzeigbares Panel mit Elementen wie Knöpfe, Textfelder, Slots, ...
modelement.itemextension.description=Die Artikelerweiterung ist eine Reihe von zusätzlichen Eigenschaften, die einem Element hinzugefügt werden können.
modelement.item.description=Ein Gegenstand ist ein Objekt, welches in der Hand gehalten werden kann. Du kannst ihn benutzen und es kann Schaden nehmen.
modelement.keybind.description=Eine Tastenbelegung bindet einen Event-/Prozedur-Aufruf an eine Taste.
modelement.loottable.description=Die Beutetabelle gibt an, welche Gegenstände normalerweise in Behältern/Inventaren generiert werden.
modelement.livingentity.description=Lebende Entität ist Entität mit Bewegung, KI-Aufgaben, Gesundheit, Inventar, ...
modelement.overlay.description=Ein Overlay ist ein zusätzliches GUI, dass wie die Benutzeroberfläche im Spiel gesehen werden kann.
modelement.painting.description=Ein Gemälde ist ein Bild, dass du mit dem Gemälde-Item an Wände hängen kannst
modelement.particle.description=Partikel ist ein spezieller Grafikeffekt, der bei bestimmten Ereignissen entsteht.
modelement.plant.description=Eine Pflanze ist ein Block, der auf Gras spawnen/platziert und wachsen kann.
modelement.potioneffect.description=Trankeffekt ist ein Effekt, der Wesen gegeben werden kann.
modelement.potion.description=Trank Item ist ein Gegenstand, der dem Wesen Effekte gibt.
modelement.procedure.description=Eine Prozedur ist eine Abfolge von Aktionen/Befehlen, die von Events und/oder optionalen Auslösern aufgerufen wird.
modelement.projectile.description=Projektil ist eine Entität, die in jede Richtung geschossen werden kann.
modelement.recipe.description=Ein Rezept ist eine Vorlage von Blöcken und Gegenständen, die dir einen neuen Block oder Gegenstand geben.
modelement.specialentity.description=Besondere Entität ist eine Entität mit besonderem Verhalten (z. B. Boote).
modelement.structure.description=Eine Struktur ist eine kleinere Anzahl von Blöcken, die basierend auf definierten Bedingungen generiert wird.
modelement.tab.description=Ein Kreativ-Tab ist eine Gruppierung von Gegenständen und Blöcken, der im Kreativ-Inventar gesehen werden kann.
modelement.tool.description=Werkzeug ist ein Gegenstand, der dir beim Graben oder Angreifen hilft.
modelement.villagerprofession.description=Der Dorfbewohner-Beruf definiert eine Version des Dorfbewohners mit benutzerdefiniertem Aussehen und Angeboten.
modelement.villagertrade.description=Der Dorfbewohner-Handel fügt dem Dorfbewohner-Beruf neue Angebote hinzu.
modelement.beitem.description=Gegenstand ist ein Objekt, das in der Hand gehalten werden kann. Es kann auch als Werkzeug fungieren. Speziell für die "Bedrock" Edition.
modelement.beblock.description=Block ist die Basiseinheit in Minecraft. Es ist ein 3D-Objekt, das in der Welt platziert werden kann. Spezifisch für die Bedrock Edition.
modelement.bebiome.description=Ein Biom ist ein spezifischer Bereich in der Welt mit Einstellungen für die Welt-Generation, Farbgebung, Wetter und Pflanzen-/Tierwelt.
modelement.bescript.description=Skript ist ein grafisch gestalteter Ablauf von Ereignissen und Aktionen mit einem bestimmten Auslöser.
preferences.section.ui=Benutzeroberfläche
preferences.section.ui.description=Auf dieser Seite kannst du die Einstellungen und Parameter der Benutzeroberfläche ändern. Wenn du etwas änderst, musst du MCreator neustarten, damit die Änderungen wirksam werden.
preferences.section.integrations=Integrationen
preferences.section.integrations.description=Auf dieser Seite kannst du Einstellungen für Integrationen mit anderen Programmen und Diensten ändern.
preferences.section.backups=Sicherheitskopien und Speichern
preferences.section.backups.description=Auf dieser Seite kannst du Einstellungen zum automatischen Speichern und zum Erstellen von Sicherungskopien der Arbeitsumgebung ändern.
preferences.section.blockly=Blockly-Editor
preferences.section.blockly.description=Auf dieser Seite kannst du die Einstellungen für den blockierten Editor ändern, die in Prozeduren, Entität, Erweiterung, Befehl und Feature-Editor verwendet werden.
preferences.section.ide=Code-Editor
preferences.section.ide.description=Auf dieser Seite kannst du Einstellungen des integrierten Code-Editors ändern.
preferences.section.codeStyle=Code-Stil
preferences.section.codeStyle.description=Auf dieser Seite kannst du die Code-Stil-Einstellungen ändern.
preferences.section.imageEditor=Bild-Editor
preferences.section.imageEditor.description=Auf dieser Seite kannst du die Einstellungen des integrierten Bild-Bearbeiters ändern.
preferences.section.gradle=Gradle und Ausführen
preferences.section.gradle.description=Auf dieser Seite kannst du die Gradle-Bildungs-Systemeinstellungen anpassen. Das Ausführen der Gradle-Aufgaben wird davon nicht beeinflusst.
preferences.section.bedrock=Bedrock-Einstellungen
preferences.section.bedrock.description=Auf dieser Seite kannst du die Einstellung bezüglich der Unterstützung für Minecraft Bedrock Edition anpassen
preferences.section.notifications=Benachrichtigungen
preferences.section.notifications.description=Auf dieser Seite können Sie Einstellungen für Benachrichtigungen in MCreator ändern.
preferences.ui.language=Sprache der Benutzeroberfläche
preferences.ui.language.description=WARNUNG\: Übersetzungen sind Community-Beiträge und können daher ungenau sein, fehlen oder falsch sein.<br> Du musst MCreator neu starten, um die Änderungen wirksam zu machen.
preferences.ui.useMacOSMenuBar=Standard-MacOS-Menüleiste verwenden
preferences.ui.useMacOSMenuBar.description=Verwende auf einem macOS-Gerät die Standardmenüleiste oben auf dem Bildschirm.
preferences.ui.nativeFileChooser=Native Systemdateiauswahl verwenden
preferences.ui.nativeFileChooser.description=Aktiviere die Auswahl der nativen Systemdateien. Derzeit funktioniert dies nur unter Windows & macOS.
preferences.ui.interfaceAccentColor=Akzentfarbe der Benutzeroberfläche
preferences.ui.interfaceAccentColor.description=Die Akzentfarbe der Benutzeroberflächen-Elemente. MCreator muss bei einer Änderung neu gestartet werden.
preferences.ui.backgroundSource=Hintergrundquelle
preferences.ui.backgroundSource.description=Dies legt fest, welche Quelle zum Laden von MCreator-UI-Hintergründen verwendet werden soll.
preferences.ui.interfaceTheme=Farbschema der Benutzeroberfläche
preferences.ui.interfaceTheme.description=Das Farbschema der Benutzeroberfläche. MCreator muss bei einer Änderung neu gestartet werden.<br>ACHTUNG\: Das Helle Design ist experimentell und kann manchmal schlecht aussehen.
preferences.ui.expandSectionsByDefault=Gruppierte Bereiche der Benutzeroberfläche standardmäßig ausklappen
preferences.ui.expandSectionsByDefault.description=Aktiviere dies um Bereiche der Benutzeroberfläche, die standardmäßig zusammengeklappt sind, ausgeklappt anzuzeigen.
preferences.ui.autoReloadTabs=Daten in Tabs automatisch neu laden
preferences.ui.autoReloadTabs.description=Deaktivieren Sie diese Option, wenn Sie Leistungsprobleme beim Wechseln von Tabs haben
preferences.ui.remindOfUnsavedChanges=Warnen Sie vor ungespeicherten Änderungen im Mod-Element-Editor
preferences.ui.remindOfUnsavedChanges.description=Wenn aktiviert, wird die Schließung des Mod-Element-Editors ohne Speichern der Änderungen vorschlagen, diese zu speichern
preferences.integrations.discordRichPresenceEnable=Aktiviere die Statusanzeige für Discord
preferences.integrations.discordRichPresenceEnable.description=<html>Wenn aktiviert, wird MCreator mit der Discord App teilen, dass du MCreator benutzt.<br>Arbeitsbereichsname, Typ und Titel des aktiven Tab werden mit Discord geteilt.
preferences.integrations.googleAnalyticsEnable=Nutzungsanalyse aktivieren (mithilfe von Google Analytics)
preferences.integrations.googleAnalyticsEnable.description=<html>Wenn aktiviert, sammelt MCreator anonyme Nutzungsstatistiken und sendet sie an Google Analytics.<br>Diese Informationen werden verwendet, um MCreator zu verbessern. Weitere Informationen finden Sie in den Datenschutzrichtlinien auf der Website von MCreator.
preferences.backups.enableLocalHistory=Lokalen Verlauf aktivieren
preferences.backups.enableLocalHistory.description=<html>Wenn aktiviert, erstellt MCreator lokale Verlaufsüberprüfungspunkte für jedes bedeutende Ereignis im Arbeitsbereich<br>erlaubt eine einfache Rückkehr zu vorherigen Zuständen. Nach dem Ändern dieser Einstellung muss der Arbeitsbereich wieder geöffnet werden, damit er sich bewerben kann.<br>Lokale Chronik kann große Arbeitsbereiche verlangsamen, bietet aber eine Möglichkeit, zu vorherigen Zuständen zurückzukehren.
preferences.backups.localHistorySaveInterval=Speichernintervall für den lokalen Verlauf (in Minuten)
preferences.backups.localHistorySaveInterval.description=<html>Legt fest, wie oft lokale Kontrollpunkte erstellt werden.<br> Ein kleinerer Wert bedeutet häufigere Kontrollpunkte, aber mehr Speicherplatz. Wichtige Änderungen umgehen dieses Intervall.
preferences.backups.workspaceAutosaveInterval=Automatisches Speicherintervall der Arbeitsbereichsdatei (in Sekunden)
preferences.backups.workspaceAutosaveInterval.description=Dieser Parameter definiert, wie oft deine Arbeitsumgebung automatisch gespeichert wird, falls Änderungen stattfanden.<br>Die Arbeitsumgebung wird außerdem automatisch gespeichert, wenn du MCreator schließt.
preferences.backups.automatedBackupInterval=Automatisches Sicherungsintervall für Arbeitsbereichsdateien (in Minuten)
preferences.backups.automatedBackupInterval.description=Dieser Parameter definiert, wie oft eine Sicherheitskopie (Backup) von deiner Arbeitsumgebung erstellt wird.<br>Kleinere Werte bedeuten mehr Backups, aber weniger Zeit/Änderungen, die zwischen ihnen liegt.
preferences.backups.numberOfBackupsToStore=Anzahl der zu speichernden Arbeitsbereichsdatei-Backups
preferences.backups.numberOfBackupsToStore.description=Diese Nummer gibt an, wie viele Sicherheitskopien (Backups) gespeichert werden.<br>Wenn mehr Backups als diese Nummer angibt erstellt wurden, wird das älteste gelöscht.
preferences.backups.backupOnVersionSwitch=Erstelle eine komplette Sicherheitskopie (Backup), wenn die Arbeitsumgebung in einer neuen Version geöffnet wird
preferences.backups.backupOnVersionSwitch.description=Wenn dies aktiviert ist, wird MCreator wird eine vollständige Kopie der Arbeitsumgebung anlegen, bevor sie in einer neuen Version geöffnet wird
preferences.blockly.useGPUAcceleration=GPU-Beschleunigung verwenden, wenn möglich
preferences.blockly.useGPUAcceleration.description=Wenn aktiviert, wird Blockly die GPU-Beschleunigung verwenden, wenn möglich. Aktiviere diese Option, es sei denn, du hast Probleme mit<br>Treiber-Kompatibilität oder hast Leistungsprobleme.
preferences.blockly.blockRenderer=Block Display
preferences.blockly.blockRenderer.description=<html>Der Renderer (Display-Stil) der Blöcke im Blockly-Editor.<ul><li>Thrasos ist der neue, empfohlene und modernere Rendering-Motor.<li>Geras ist Blockly's ursprünglicher Rendering-Engine.<li>Zelos ist eine Rendering-Engine ähnlich wie Scratch 3.0.</ul>
preferences.blockly.useSmartSort=Benutze intelligente Anordnung für Prozedur-Blöcke
preferences.blockly.useSmartSort.description=Wenn dies aktiviert ist, werden Prozedur-Blöcke intelligent angeordnet, sonst werden sie alphabetisch sortiert
preferences.blockly.expandCategories=Toolbox Kategorien erweitern
preferences.blockly.expandCategories.description=Diese Option legt fest, ob verschachtelte Kategorien beim Öffnen eines Blockly-Editors erweitert werden sollen.<br>Standardeinstellung verwenden, um die Standardeinstellung für jede Kategorie zu verwenden. Erfordert einen Neustart von MCreator um wirksam zu werden.
preferences.blockly.enableComments=Erlaube Block-Kommentare
preferences.blockly.enableComments.description=Aktiviere dies um zu ermöglichen, dass Kommentare an Blöcke geheftet werden
preferences.blockly.enableCollapse=Blöcke einklappen erlauben
preferences.blockly.enableCollapse.description=Diese option ermöglicht, dass Blöcke einklappbar sind
preferences.blockly.enableTrashcan=Aktiviere den Mülleimer
preferences.blockly.enableTrashcan.description=Diese Option aktiviert den Mülleimer im Blockly-Editor
preferences.blockly.maxTrashContents=Maximale Trashcan Kapazität
preferences.blockly.maxTrashContents.description=Wenn der Papierkorb aktiviert ist, legt diese Option die maximale Anzahl gelöschter Blöcke fest, die im Papierkorb erscheinen
preferences.blockly.maxScale=Maximale Vergrößerung
preferences.blockly.maxScale.description=Maximale Vergrößerung im Blockly-Editor in %
preferences.blockly.minScale=Minimale Vergrößerung/Verkleinerung
preferences.blockly.minScale.description=Minimal unterstützte Zoom-Skala im Blockly-Editor in %
preferences.blockly.startScale=Zoom-Skala starten
preferences.blockly.startScale.description=Die Zoom-Skalierung in % des Editors beim Öffnen
preferences.blockly.scaleSpeed=Vergrößerungsgeschwindigkeit
preferences.blockly.scaleSpeed.description=Keine Vergrößerung \= 100, Vergrößerung > 100, Verkleinerung < 100
preferences.blockly.colorSaturation=Farbsättigung der Blöcke
preferences.blockly.colorSaturation.description=Diese Option bestimmt die Sättigung der voreingestellten Blockly-Blöcke. Durch die Erhöhung der Blöcke werden Blöcke unterschiedlicher. Standardwert ist 45.
preferences.blockly.colorValue=Helligkeit der Blöcke
preferences.blockly.colorValue.description=Diese Option bestimmt die Helligkeit der Standard Blockly-Blöcke. Wenn du sie erhöhst, werden Blöcke unterschiedlicher. Standardwert ist 65.
preferences.blockly.translucentBackground=Transparenter Hintergrund aktivieren
preferences.blockly.translucentBackground.description=Dadurch wird der Hintergrund des Blockly Editors durchsichtig und übergeht den Hintergrund des UI dahinter. Funktioniert derzeit nur unter Windows und Linux.<br>Deaktivieren, wenn du Performance-oder visuelle Probleme im Blockly-Editor hast.
preferences.ide.editorTheme=Code-Editor Farbgebung
preferences.ide.fontSize=Schriftgröße
preferences.ide.fontSize.description=Initiale Schriftgröße im Code-Editor
preferences.ide.useLigatures=Schrift-Ligaturen verwenden (kompakte Symbol-Rendering)
preferences.ide.useLigatures.description=Wenn aktiviert, werden bestimmte Zeichenkombinationen wie >\=, \!\=, etc. als einzelnes Symbol dargestellt.
preferences.ide.autocomplete=Erlaube automatische Vervollständigung
preferences.ide.autocompleteMode=Automatische Vervollständigung des Dropdown-Modus
preferences.ide.autocompleteMode.description=Manuelle Auslöser lösen die automatische Vervollständigung nur durch das drücken von Strg + Leertaste aus, Smart Mode löst sie basierend auf den Kontext aus.
preferences.ide.autocompleteDocWindow=Dokumentationsfenster für die automatische Vervollständigung aktivieren
preferences.ide.autocompleteDocWindow.description=Zeigt zusätzliche Java-Dokumentationsfenster neben dem Fenster für die Dokumentation der automatischen Vervollständigung
preferences.ide.lineNumbers=Zeige Zeilennummerierung im Editor an
preferences.ide.errorInfoEnable=Infostreifen im Editor anzeigen
preferences.ide.errorInfoEnable.description=Zeige fehlerhafte Zeilen, Warnungen und aktuelle Suchergebnisse an
preferences.codeStyle.maximumImports=Grenzwert für Wildcard-Gruppierung importieren
preferences.codeStyle.maximumImports.description=Diese Option legt fest, wie viele Einklassen-Importe aus einem Paket vorhanden sein müssen, bevor sie durch einen Wildcard-Import ersetzt werden.<br>Du kannst die Gruppierung deaktivieren, indem du 0 dieser Option zuweist.
preferences.imageEditor.storeMetadata=Bild-Metadaten speichern (Ebenen-Info, Auswahl usw.)
preferences.imageEditor.storeMetadata.description=Wenn aktiviert, werden separate Ebenen für eine spätere Bearbeitung gespeichert. Erhöht den Arbeitsbereich-Speicherverbrauch auf der Festplatte.
preferences.gradle.buildOnSave=Basiscode aktualisieren und den Arbeitsbereich erstellen, wenn ein Mod-Element gespeichert wird
preferences.gradle.buildOnSave.description=Aktiviere dies, um über Fehler in deinem Mod-Element-Code informiert zu werden, sobald du es speicherst. Verlangsamt das Speichern von Mod-Elementen.
preferences.gradle.passLangToMinecraft=Spracheinstellungen an den Minecraft-Client übergeben
preferences.gradle.passLangToMinecraft.description=Wenn aktiviert, wird die Spracheinstellung von Minecraft bei jedem Start auf die Spracheinstellung von MCreator gesetzt.
preferences.gradle.enablePerformanceMonitor=Leistungsmonitor beim Ausführen von Gradle-Aufgaben aktivieren
preferences.gradle.enablePerformanceMonitor.description=Wenn aktiviert, zeigt MCreator CPU- und Speicherauslastung während Gradle-Aufgaben wie Client-Ausführung an.
preferences.gradle.Xmx=Maximaler Speicher
preferences.gradle.Xmx.description=Die maximale RAM-Größe, die das Gradle-System reservieren darf.
preferences.gradle.offline=Führen Sie Gradle im Offline-Modus aus
preferences.gradle.offline.description=Aktivieren Sie dies, wenn Sie MCreator mit einer Internetverbindung installiert haben, aber jetzt Modifikationen ohne Internet entwickeln möchten.<br><b>Es macht nur Sinn, dies zu verwenden, wenn Sie keinen Internetzugang haben\!<br>Wenn Sie diese Option aktivieren, können mehrere Build-Probleme auftreten. Verwenden Sie dies daher nur, wenn dies unbedingt notwendig ist\!</b>
preferences.bedrock.silentReload=Lade die Bedrock Edition App im Hintergrund leise neu
preferences.bedrock.silentReload.description=Denk daran, dass das stille Neuladen keinen ungespeicherten Welten-Fortschritt speichern wird, also verwende dies nur in Testwelten.
