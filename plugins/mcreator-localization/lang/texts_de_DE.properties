dialog.tools.inject_tags.tag.damage_types.minecraft.is_fall=Schadensarten in dieser Tag-Gruppe sind durch langsamen fallenden Effekt, feder fallende Verzauberung und "fallDamage"-Spielregel beeinflusst.
dialog.tools.inject_tags.tag.damage_types.minecraft.is_fire=Schadensarten in dieser Tag-Gruppe sind von Feuerwiderstandseffekt, Brandschutzverzauberung und "fireDamage"-Spielregeln betroffen.
