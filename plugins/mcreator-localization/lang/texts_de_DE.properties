dialog.tools.inject_tags.tag.damage_types.minecraft.is_projectile=Schadensarten in dieser Tag-Gruppe sind von einer Projektilschutz-Verzauberung betroffen.
dialog.tools.inject_tags.tag.damage_types.minecraft.bypasses_armor=Schadensarten in dieser Tag-Gruppe werden nicht durch Rüstungen oder Schilde reduziert.
