name: Build and test

permissions:
  checks: write

on:
  push:
    branches:
      - master
      - "feature/*"
      - "dev/*"
  pull_request:
    branches:
      - master
      - "feature/*"
      - "dev/*"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25.0.3'
          distribution: 'jetbrains'
          java-package: 'jdk+jcef'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache MCreator Gradle Packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.mcreator/gradle/caches/
            ~/.mcreator/gradle/wrapper/
          key: ${{ runner.os }}-mcreator-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-mcreator-gradle-
      - name: Build and Test Using Gradle
        run: xvfb-run -a gradle --no-build-cache clean test
      - name: Test Javadoc Generation
        run: ./gradlew javadoc
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 #v6.4.2
        if: always() # always run even if the previous step fails
        with:
          include_passed: true
          detailed_summary: true
          report_paths: '**/build/test-results/test/TEST-*.xml'
      - name: Prepare Gradle Cache
        run: |
          rm -f  ~/.mcreator/gradle/caches/modules-2/modules-2.lock
          rm -fr ~/.mcreator/gradle/caches/*/plugin-resolution/
          rm -f  ~/.mcreator/gradle/caches/minecraft/deobfedDeps/providedDummy.jar
          rm -f  ~/.mcreator/gradle/caches/minecraft/deobfedDeps/compileDummy.jar
